<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Andrew's Calendar — 2026</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f0f4f9;color:#202124}
.layout{display:flex;min-height:100vh}

/* ── SIDEBAR ── */
.sidebar{width:224px;flex-shrink:0;background:#fff;border-right:1px solid #e0e0e0;height:100vh;position:sticky;top:0;overflow-y:auto;display:flex;flex-direction:column}
.sb-head{display:flex;justify-content:space-between;align-items:center;padding:14px 12px 10px;border-bottom:1px solid #eee}
.sb-title{font-size:13px;font-weight:600;color:#3c4043}
.sb-acts{display:flex;gap:5px}
.sb-acts button{background:none;border:1px solid #dadce0;border-radius:10px;padding:2px 8px;font-size:11px;color:#5f6368;cursor:pointer;font-family:inherit}
.sb-acts button:hover{background:#f1f3f4}
.cal-list{padding:4px 0 16px}
.cat-head{font-size:10px;font-weight:700;color:#9aa0a6;text-transform:uppercase;letter-spacing:.8px;padding:10px 12px 3px}
.cal-item{display:flex;align-items:center;gap:7px;padding:5px 12px;cursor:pointer}
.cal-item:hover{background:#f8f9fa}
.cal-item input{width:14px;height:14px;cursor:pointer;flex-shrink:0}
.cal-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.cal-name{font-size:12px;color:#3c4043;line-height:1.35;user-select:none}
.cal-item.dim .cal-name{color:#aaa}

/* ── MAIN ── */
.main{flex:1;min-width:0;padding:20px 24px;overflow:hidden}
h1{font-size:22px;font-weight:400;color:#3c4043;margin-bottom:2px}
.subtitle{color:#70757a;font-size:13px;margin-bottom:16px}
.tabs{display:flex;gap:8px;margin-bottom:20px}
.tab{padding:7px 20px;border-radius:20px;border:1px solid #dadce0;background:#fff;color:#3c4043;font-size:13px;font-family:inherit;cursor:pointer;transition:all .15s}
.tab:hover{background:#f0f4f9;border-color:#bdc1c6}
.tab.active{background:#1a73e8;color:#fff;border-color:#1a73e8;font-weight:500}
.view-pane{display:none}
.view-pane.active{display:block}

/* ── WEEK VIEW ── */
.week-wrap{background:#fff;border-radius:12px;box-shadow:0 1px 4px rgba(0,0,0,.12),0 0 0 1px rgba(0,0,0,.05);margin-bottom:20px;overflow:hidden}
.week-label{font-size:11px;color:#70757a;font-weight:600;text-transform:uppercase;letter-spacing:.8px;padding:10px 16px;background:#f8f9fa;border-bottom:1px solid #e8eaed}
.col-header{display:grid;grid-template-columns:52px repeat(7,1fr);border-bottom:1px solid #e8eaed}
.hdr-spacer{}
.hdr-day{text-align:center;padding:10px 4px 8px;border-left:1px solid #f0f0f0}
.hdr-day .dname{font-size:11px;color:#70757a;text-transform:uppercase;letter-spacing:.5px;font-weight:500}
.hdr-day .dnum{font-size:24px;font-weight:300;color:#3c4043;line-height:1.2}
.hdr-day.today .dnum{background:#1a73e8;color:#fff;border-radius:50%;width:38px;height:38px;display:inline-flex;align-items:center;justify-content:center;font-size:20px;font-weight:500}
.hdr-day.weekend .dname,.hdr-day.weekend .dnum{color:#bbb}
.allday-section{display:grid;grid-template-columns:52px repeat(7,1fr);border-bottom:2px solid #e8eaed;min-height:26px}
.allday-lbl{font-size:9px;color:#9aa0a6;display:flex;align-items:flex-start;justify-content:flex-end;padding:5px 6px;text-transform:uppercase;letter-spacing:.5px}
.allday-col{border-left:1px solid #f0f0f0;padding:2px 1px}
.aev{border-radius:3px;padding:2px 5px;font-size:10px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:1px;display:block;line-height:1.5}
.time-grid{display:grid;grid-template-columns:52px repeat(7,1fr);position:relative}
.time-lbl{height:56px;display:flex;align-items:flex-start;justify-content:flex-end;padding:0 6px}
.time-lbl span{font-size:10px;color:#9aa0a6;position:relative;top:-7px;white-space:nowrap}
.day-col{border-left:1px solid #f0f0f0;position:relative}
.hour-line{position:absolute;left:0;right:0;border-top:1px solid #f1f3f4;z-index:0}
.half-line{position:absolute;left:0;right:0;border-top:1px dotted #f7f8f9;z-index:0}
.ev{position:absolute;border-radius:4px;padding:3px 5px;overflow:hidden;z-index:1;cursor:default;transition:box-shadow .15s}
.ev:hover{box-shadow:0 2px 8px rgba(0,0,0,.2);z-index:10}
.ev .ev-time{font-size:10px;display:block;line-height:1.3;opacity:.85}
.ev .ev-title{font-size:11px;font-weight:500;display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.4}
.day-col.today-col{background:rgba(26,115,232,.02)}

/* ── MONTH VIEW ── */
.months-3{display:grid;grid-template-columns:repeat(3,1fr);gap:20px}
.months-6{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.m-wrap{background:#fff;border-radius:12px;box-shadow:0 1px 4px rgba(0,0,0,.12),0 0 0 1px rgba(0,0,0,.05);overflow:hidden}
.m-header{font-size:16px;font-weight:500;color:#3c4043;padding:14px 16px 8px}
.m-daynames{display:grid;grid-template-columns:repeat(7,1fr);border-bottom:1px solid #e8eaed}
.m-dn{text-align:center;padding:5px 2px;font-size:11px;font-weight:600;color:#70757a;text-transform:uppercase;letter-spacing:.4px}
.m-dn.m-dn-we{color:#c8c8c8}
.m-grid{display:grid;grid-template-columns:repeat(7,1fr)}
.m-cell{min-height:90px;border-right:1px solid #f0f0f0;border-bottom:1px solid #f0f0f0;padding:4px 3px;overflow:hidden}
.m-cell.m-adj{opacity:.28}
.m-cell.m-we{background:#fafafa}
.m-cell.m-today{background:rgba(26,115,232,.04)}
.m-num{font-size:13px;color:#3c4043;width:26px;height:26px;display:flex;align-items:center;justify-content:center;border-radius:50%;margin-bottom:2px;font-weight:400;flex-shrink:0}
.m-num.m-num-today{background:#1a73e8;color:#fff;font-weight:500}
.m-ev{border-radius:3px;padding:1px 5px;font-size:10px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:1px;line-height:1.6;display:block;cursor:default}
.m-more{font-size:10px;color:#70757a;padding:0 3px;line-height:1.5}
.months-6 .m-cell{min-height:65px}
.months-6 .m-ev{font-size:9px;padding:1px 4px;line-height:1.5}
.months-6 .m-num{font-size:11px;width:22px;height:22px}
.months-6 .m-header{font-size:14px;padding:10px 12px 6px}
.months-6 .m-dn{font-size:10px;padding:4px 2px}
.months-6 .m-more{font-size:9px}
</style>

// ─── CORE RENDER FUNCTIONS ─────────────────────────────────────────
function t2y(h,m){return(h-START_H)*HOUR_H+(m/60)*HOUR_H}
function d2h(m){return Math.max((m/60)*HOUR_H,20)}
function fmt(h,m){const ap=h<12?'AM':'PM';const h12=h===0?12:h>12?h-12:h;return`${h12}:${String(m).padStart(2,'0')} ${ap}`}

function computeLanes(evs){
  evs=[...evs].sort((a,b)=>(a.h*60+a.m)-(b.h*60+b.m));
  const ends=[];
  for(const e of evs){
    const s=e.h*60+e.m,f=s+e.dur;
    let li=ends.findIndex(x=>x<=s);
    if(li<0){li=ends.length;ends.push(f);}else ends[li]=f;
    e._l=li;e._s=s;e._f=f;
  }
  for(const e of evs){
    let mc=e._l+1;
    for(const o of evs)if(o!==e&&e._s<o._f&&e._f>o._s)mc=Math.max(mc,o._l+1);
    e._ml=mc;
  }
  return evs;
}

function buildTimedCol(parent,evArr,isToday,totalH){
  const col=document.createElement('div');
  col.className='day-col'+(isToday?' today-col':'');
  col.style.cssText=`height:${totalH}px;position:relative`;
  for(let h=START_H;h<END_H;h++){
    const y=(h-START_H)*HOUR_H;
    const hl=document.createElement('div');hl.className='hour-line';hl.style.top=y+'px';col.appendChild(hl);
    const hf=document.createElement('div');hf.className='half-line';hf.style.top=(y+HOUR_H/2)+'px';col.appendChild(hf);
  }
  for(const e of computeLanes(evArr)){
    const el=document.createElement('div');el.className='ev';
    const lw=100/e._ml,lp=e._l*lw;
    el.style.cssText=`top:${t2y(e.h,e.m)}px;height:${d2h(e.dur)}px;left:calc(${lp}% + 2px);width:calc(${lw}% - 4px);${evStyle(e.calId)}`;
    const em=e.h*60+e.m+e.dur;
    el.title=`${e.title}\n${fmt(e.h,e.m)} \u2013 ${fmt(Math.floor(em/60),em%60)}`;
    el.innerHTML=`<span class="ev-time">${fmt(e.h,e.m)}</span><span class="ev-title">${e.title}</span>`;
    col.appendChild(el);
  }
  return col;
}

  cfg.dates.forEach(ds=>{
    const col=document.createElement('div');col.className='allday-col';
    const evs=(byDate[ds]||[]).filter(e=>enabled.has(e.calId));
    evs.slice(0,4).forEach(e=>{
      const el=document.createElement('span');el.className='aev';
      el.style.cssText=chipStyle(e.calId);el.textContent=e.title;el.title=e.title;col.appendChild(el);
    });
    if(evs.length>4){const m=document.createElement('span');m.className='aev';m.style.cssText='background:#e8eaed;color:#5f6368';m.textContent=`+${evs.length-4} more`;col.appendChild(m);}
    adSec.appendChild(col);
  });
  wrap.appendChild(adSec);

  // Timed grid
  const grid=document.createElement('div');grid.className='time-grid';
  const totalH=(END_H-START_H)*HOUR_H;
  // Time label column
  const tcol=document.createElement('div');tcol.style.cssText=`position:relative;height:${totalH}px`;
  for(let h=START_H;h<END_H;h++){
    const lbl2=h===0?'':h<12?`${h} AM`:h===12?'12 PM':`${h-12} PM`;
    const tl=document.createElement('div');tl.className='time-lbl';
    tl.style.cssText=`position:absolute;top:${(h-START_H)*HOUR_H}px;width:52px`;
    tl.innerHTML=`<span>${lbl2}</span>`;tcol.appendChild(tl);
  }
  grid.appendChild(tcol);
  cfg.dates.forEach((ds,i)=>{
    const dayEvs=(cfg.ev[i]||[]).filter(e=>enabled.has(e.calId));
    grid.appendChild(buildTimedCol(grid,dayEvs,ds===TODAY,totalH));
  });
  wrap.appendChild(grid);
  container.appendChild(wrap);
}

function expandEvents(evs){
  const byDate={};
  for(const [s,e,title,calId] of evs){
    const[sy,sm,sd]=s.split('-').map(Number);
    const[ey,em,ed]=e.split('-').map(Number);
    let d=new Date(sy,sm-1,sd);
    const fin=new Date(ey,em-1,ed);
    while(d<=fin){
      const k=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
      (byDate[k]=byDate[k]||[]).push({title,calId});
      d.setDate(d.getDate()+1);
    }
  }
  return byDate;
}

const MN=['January','February','March','April','May','June','July','August','September','October','November','December'];
const DA=['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];

function buildMonthGrid(container,year,month,byDate,compact){
  const maxE=compact?2:3;
  const wrap=document.createElement('div');wrap.className='m-wrap';
  const hdr=document.createElement('div');hdr.className='m-header';hdr.textContent=MN[month]+' '+year;wrap.appendChild(hdr);
  const dn=document.createElement('div');dn.className='m-daynames';
  DA.forEach((n,i)=>{const d=document.createElement('div');d.className='m-dn'+(i>=5?' m-dn-we':'');d.textContent=n;dn.appendChild(d);});
  wrap.appendChild(dn);
  const grid=document.createElement('div');grid.className='m-grid';
  const fd=new Date(year,month,1).getDay();
  const fm=(fd+6)%7;
  const dim=new Date(year,month+1,0).getDate();
  const pmd=new Date(year,month,0).getDate();
  for(let i=fm-1;i>=0;i--){
    const c=document.createElement('div');c.className='m-cell m-adj';
    const n=document.createElement('div');n.className='m-num';n.textContent=pmd-i;c.appendChild(n);grid.appendChild(c);
  }
  for(let d=1;d<=dim;d++){
    const ds=`${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const di=(fm+d-1)%7;
    const c=document.createElement('div');
    c.className='m-cell'+(di>=5?' m-we':'')+(ds===TODAY?' m-today':'');
    const n=document.createElement('div');n.className='m-num'+(ds===TODAY?' m-num-today':'');n.textContent=d;c.appendChild(n);
    const evs=byDate[ds]||[];
    evs.slice(0,maxE).forEach(e=>{
      const p=document.createElement('div');p.className='m-ev';
      p.style.cssText=pillStyle(e.calId);p.textContent=e.title;p.title=e.title;c.appendChild(p);
    });
    if(evs.length>maxE){const m=document.createElement('div');m.className='m-more';m.textContent=`+${evs.length-maxE} more`;c.appendChild(m);}
    grid.appendChild(c);
  }
  const tot=fm+dim,trail=(7-(tot%7))%7;
  for(let i=1;i<=trail;i++){
    const c=document.createElement('div');c.className='m-cell m-adj';
    const n=document.createElement('div');n.className='m-num';n.textContent=i;c.appendChild(n);grid.appendChild(c);
  }
  wrap.appendChild(grid);container.appendChild(wrap);
}

// ─── SIDEBAR ───────────────────────────────────────────────────────
function buildSidebar(){
  const list=document.getElementById('cal-list');list.innerHTML='';
  ['Personal','Work','Family','Other'].forEach(cat=>{
    const ids=Object.keys(CALS).filter(id=>CALS[id].cat===cat);
    if(!ids.length)return;
    const ch=document.createElement('div');ch.className='cat-head';ch.textContent=cat;list.appendChild(ch);
    ids.forEach(id=>{
      const cal=CALS[id];
      const item=document.createElement('label');item.className='cal-item'+(cal.on?'':' dim');item.htmlFor='chk-'+id;
      const chk=document.createElement('input');chk.type='checkbox';chk.id='chk-'+id;chk.checked=cal.on;
      chk.style.accentColor=cal.hex;
      chk.addEventListener('change',e=>{
        CALS[id].on=e.target.checked;
        item.classList.toggle('dim',!e.target.checked);
        const dot=item.querySelector('.cal-dot');if(dot)dot.style.background=CALS[id].on?cal.hex:'#ccc';
        rerenderAll();
      });
      const dot=document.createElement('div');dot.className='cal-dot';dot.style.background=cal.on?cal.hex:'#ccc';
      const nm=document.createElement('span');nm.className='cal-name';nm.textContent=cal.name;
      item.appendChild(chk);item.appendChild(dot);item.appendChild(nm);list.appendChild(item);
    });
  });
}

// ─── RE-RENDER ─────────────────────────────────────────────────────
function rerenderAll(){
  const enabled=new Set(Object.keys(CALS).filter(id=>CALS[id].on));
  const filtered=ALL_EVENTS.filter(([,,,calId])=>enabled.has(calId));
  const byDate=expandEvents(filtered);
  WEEK_CFGS.forEach(cfg=>buildWeekPanel(cfg,byDate,enabled));
  const g3=document.getElementById('grid-3month');g3.innerHTML='';
  [2,3,4].forEach(m=>buildMonthGrid(g3,2026,m,byDate,false));
  const g6=document.getElementById('grid-6month');g6.innerHTML='';
  [2,3,4,5,6,7].forEach(m=>buildMonthGrid(g6,2026,m,byDate,true));
}
